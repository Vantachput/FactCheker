name: Deploy Sphinx Docs to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme sphinx-intl

      - name: Build Ukrainian documentation
        run: |
          python -m sphinx -b html docs/source docs/build/html/uk

      - name: Build English documentation (via gettext i18n)
        run: |
          python -m sphinx -b html -D language=en docs/source docs/build/html/en

      - name: Create language selector landing page
        run: |
          cat > docs/build/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>FactChecker Documentation</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
              .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
                border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
                padding: 60px 80px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
              .emoji { font-size: 60px; margin-bottom: 20px; display: block; }
              h1 { color: #fff; font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
              p { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-bottom: 40px; }
              .lang-label { color: rgba(255,255,255,0.4); font-size: 0.75rem;
                text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
              .buttons { display: flex; gap: 20px; justify-content: center; }
              .btn { display: flex; flex-direction: column; align-items: center; gap: 8px;
                padding: 20px 40px; border-radius: 12px; text-decoration: none;
                font-weight: 600; font-size: 1.1rem; transition: all 0.25s ease; border: 2px solid transparent; }
              .btn-ua { background: linear-gradient(135deg, #005BBB, #003f8a); color: #FFD700; border-color: #FFD700; }
              .btn-ua:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,91,187,0.5); }
              .btn-en { background: linear-gradient(135deg, #2c6e49, #1a4430); color: #e0f7e9; border-color: #52b788; }
              .btn-en:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(82,183,136,0.4); }
              .btn-flag { font-size: 1.8rem; }
            </style>
          </head>
          <body>
            <div class="card">
              <span class="emoji">&#128373;&#65039;</span>
              <h1>FactChecker Documentation</h1>
              <p>AI-Powered Fake News Detector &#8212; Telegram Bot</p>
              <div class="lang-label">Select language / &#1054;&#1073;&#1077;&#1088;&#1110;&#1090;&#1100; &#1084;&#1086;&#1074;&#1091;</div>
              <div class="buttons">
                <a href="uk/index.html" class="btn btn-ua">
                  <span class="btn-flag">&#127482;&#127462;</span>
                  &#1059;&#1082;&#1088;&#1072;&#1111;&#1085;&#1089;&#1100;&#1082;&#1072;
                </a>
                <a href="en/index.html" class="btn btn-en">
                  <span class="btn-flag">&#127468;&#127463;</span>
                  English
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          commit_message: "docs: auto-generate bilingual Sphinx docs [skip ci]"
